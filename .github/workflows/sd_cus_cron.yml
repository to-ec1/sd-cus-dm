name: Scheduled Sync Job
on:
  schedule:
    # 毎日午前1時（日本時間午前10時、夜間対象外時間）に自動実行
    - cron: '0 1 * * *'
  workflow_dispatch: # 手動実行可能にするトリガー
jobs:
  run-send:
    runs-on: ubuntu-latest
    timeout-minutes: 370
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Google Chrome (Headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install DrissionPage gspread google-auth google-auth-oauthlib python-dotenv
          fi
      - name: Run Python script
        env:
          PYTHONUNBUFFERED: "1"
          SS_SD_CUS_ID: ${{ secrets.SS_SD_CUS_ID }}
          GSPREAD_CREDENTIALS_JSON: ${{ secrets.GSPREAD_CREDENTIALS_JSON }}
          GSPREAD_TOKEN_JSON: ${{ secrets.GSPREAD_TOKEN_JSON }}
          SD_USERNAME: ${{ secrets.SD_USERNAME }}
          SD_PASSWORD: ${{ secrets.SD_PASSWORD }}
          SD_BASE_URL: ${{ secrets.SD_BASE_URL }}
          TEFFY_URL: ${{ secrets.TEFFY_URL }}
        run: python sd_cus_dm_gh.py
